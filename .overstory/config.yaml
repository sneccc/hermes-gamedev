# Overstory configuration
# See: https://github.com/overstory/overstory

project:
  name: raylib-gamedev
  root: /mnt/c/Users/Daniel/CodingProjects/hermes/gamedev_project
  canonicalBranch: main
  qualityGates:
    - name: Syntax
      command: python3 -m py_compile src/main.py
      description: all Python files must parse without syntax errors
    - name: PyrayAPI
      command: python3 -c "import ast, pyray, sys; tree=ast.parse(open(sys.argv[1]).read()); errs=[f'line {n.lineno} pyray.{n.attr} not found' for n in ast.walk(tree) if isinstance(n,ast.Attribute) and isinstance(n.value,ast.Name) and n.value.id in ('rl','pyray') and n.attr not in dir(pyray)]; print(chr(10).join(errs) or 'OK'); sys.exit(1 if errs else 0)" src/main.py
      description: all pyray API calls must reference real pyray attributes
agents:
  manifestPath: .overstory/agent-manifest.json
  baseDir: .overstory/agent-defs
  maxConcurrent: 5
  staggerDelayMs: 3000
  maxDepth: 2
  maxSessionsPerRun: 0
  maxAgentsPerLead: 3
worktrees:
  baseDir: .overstory/worktrees
taskTracker:
  backend: auto
  enabled: true
mulch:
  enabled: true
  domains: []
  primeFormat: markdown
merge:
  aiResolveEnabled: true
  reimagineEnabled: false
providers:
  anthropic:
    type: native
watchdog:
  tier0Enabled: true
  tier0IntervalMs: 30000
  tier1Enabled: false
  tier2Enabled: false
  staleThresholdMs: 300000
  zombieThresholdMs: 600000
  nudgeIntervalMs: 60000
  rpcTimeoutMs: 5000
  triageTimeoutMs: 30000
  maxEscalationLevel: 3
coordinator:
  exitTriggers:
    allAgentsDone: false
    taskTrackerEmpty: false
    onShutdownSignal: false
models:
runtime:
  default: claude
  shellInitDelayMs: 2000
logging:
  verbose: false
  redactSecrets: true
runtime:
  default: claude
  shellInitDelayMs: 0
  pi:
    provider: anthropic
    modelMap:
      opus: anthropic/claude-opus-4-6
      sonnet: anthropic/claude-sonnet-4-6
      haiku: anthropic/claude-haiku-4-5
